<!DOCTYPE html>
<html lang="ro">
  <head>
      <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>rGdbet Elite Console PRO</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />

    <style>
      :root {
          --neon-green: #00ff88;
          --dark-neon: #004d2c;
          --gold: #ffcc00;
          --danger: #ff3366;
          --card-bg: rgba(13, 17, 20, 0.95);
          --stat-bg: rgba(255, 255, 255, 0.12);
      }

      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
      input[type=number] { -moz-appearance: textfield; }

      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      body {
          margin: 0; padding: 0; min-height: 100vh; color: #fff;
          font-family: 'Rajdhani', sans-serif; background: radial-gradient(circle at center, #00663d 0%, #002b1a 50%, #05070a 100%);
          background-attachment: fixed; overflow-x: hidden;
      }

      /* HEADER & LOGO MODIFICAT CONFORM CERINȚEI */
      .app-header { padding: 30px 20px 10px 20px; text-align: center; }
      .logo-container { display: inline-block; position: relative; margin-bottom: 5px; }
      .logo-main-text { 
          font-family: 'Rajdhani', sans-serif; 
          font-size: 42px; 
          font-weight: 700; 
          letter-spacing: -1px; 
          color: #fff; /* "rGd" rămâne alb */
          margin: 0; 
          line-height: 1; 
      }
      .logo-main-text span { 
          color: var(--gold); 
          text-shadow: 0 0 15px var(--gold); /* Doar "bet" luminează gold */
      }

      .logo-underline {
          height: 3px; 
          background: #4d3d00; /* Fundal linie închis (gold dark) */
          width: 100%; margin-top: 4px;
          position: relative; overflow: hidden; border-radius: 2px;
      }
      .logo-underline::after {
          content: ""; position: absolute; top: 0; width: 40%; height: 100%;
          background: linear-gradient(90deg, transparent, var(--gold), transparent); /* Scanerul este gold */
          animation: ghost-ping-pong 2.5s infinite ease-in-out;
      }
      @keyframes ghost-ping-pong {
          0% { left: 0%; transform: translateX(-100%); }
          50% { left: 100%; transform: translateX(0%); }
          100% { left: 0%; transform: translateX(-100%); }
      }

      /* SOCIAL MEDIA PULSE EFFECT */
      .social-row { display: flex; justify-content: center; gap: 25px; margin: 15px 0; }
      .social-icon { font-size: 26px; text-decoration: none; transition: 0.3s; }
      
      @keyframes media-pulse-insta {
          0% { filter: drop-shadow(0 0 2px rgba(225, 48, 108, 0.4)); transform: scale(1); }
          50% { filter: drop-shadow(0 0 12px rgba(225, 48, 108, 0.9)); transform: scale(1.1); }
          100% { filter: drop-shadow(0 0 2px rgba(225, 48, 108, 0.4)); transform: scale(1); }
      }
      @keyframes media-pulse-fb {
          0% { filter: drop-shadow(0 0 2px rgba(24, 119, 242, 0.4)); transform: scale(1); }
          50% { filter: drop-shadow(0 0 12px rgba(24, 119, 242, 0.9)); transform: scale(1.1); }
          100% { filter: drop-shadow(0 0 2px rgba(24, 119, 242, 0.4)); transform: scale(1); }
      }
      @keyframes media-pulse-tiktok {
          0% { filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.3)); transform: scale(1); }
          50% { filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.8)); transform: scale(1.1); }
          100% { filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.3)); transform: scale(1); }
      }

      .fa-instagram { color: #E1306C; animation: media-pulse-insta 2s infinite ease-in-out; }
      .fa-facebook { color: #1877F2; animation: media-pulse-fb 2.2s infinite ease-in-out; }
      .fa-tiktok { color: #fff; animation: media-pulse-tiktok 2.4s infinite ease-in-out; }

      @keyframes pulse-gold {
          0% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0.7); transform: scale(1); }
          70% { box-shadow: 0 0 0 15px rgba(255, 204, 0, 0); transform: scale(1.02); }
          100% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0); transform: scale(1); }
      }

      .btn-donate-pulse {
          background: var(--gold); color: #000; padding: 15px; border-radius: 12px;
          font-family: 'Syncopate'; font-weight: 900; text-decoration: none;
          display: block; text-align: center; font-size: 11px; margin: 10px 20px 25px 20px;
          animation: pulse-gold 2s infinite; border: none; transition: 0.3s;
      }

      /* STATS AREA */
      .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 20px; }
      .stat-card { background: var(--stat-bg); padding: 12px; border-radius: 18px; border: 1px solid rgba(0, 255, 136, 0.3); text-align: center; backdrop-filter: blur(5px); }
      .stat-val { display: block; font-size: 22px; font-weight: bold; font-family: 'Syncopate'; }
      .stat-label { font-size: 9px; color: #bbb; text-transform: uppercase; margin-top: 5px; font-weight: 700; }

      .target-container { background: var(--card-bg); padding: 18px; border-radius: 20px; border: 1px solid rgba(0, 255, 136, 0.15); margin: 0 20px 20px 20px; }
      .target-bar-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-top: 8px; }
      .target-bar-fill { 
          height: 100%; width: 0%; 
          background: linear-gradient(90deg, var(--dark-neon) 0%, var(--neon-green) 50%, #ffffff 75%, var(--neon-green) 100%);
          background-size: 200% 100%; transition: 1s ease; 
          box-shadow: 0 0 15px var(--neon-green);
          animation: flow-light 2s infinite linear;
      }
      .target-bar-fill.near-target {
          background: linear-gradient(90deg, #b8860b 0%, var(--gold) 50%, #ffffff 75%, var(--gold) 100%);
          background-size: 200% 100%; box-shadow: 0 0 20px var(--gold);
      }
      @keyframes flow-light { 0% { background-position: 200% 0; } 100% { background-position: 0 0; } }

      /* RISK INDICATOR */
      #risk-indicator {
          font-family: 'Syncopate'; font-size: 9px; font-weight: 700;
          text-align: center; margin-bottom: 12px; transition: 0.3s; opacity: 0;
      }
      .risk-low { color: var(--neon-green); opacity: 1 !important; }
      .risk-mid { color: var(--gold); opacity: 1 !important; }
      .risk-high { color: var(--danger); opacity: 1 !important; animation: shake-risk 0.5s infinite; }
      @keyframes shake-risk { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }

      /* INPUTS & BUTTONS */
      .editable-input { background: none; border: none; border-bottom: 1px solid rgba(0, 255, 136, 0.5); color: var(--neon-green); font-family: 'Syncopate'; font-size: 18px; width: 90px; text-align: center; outline: none; }
      .target-input-small { background: none; border: none; border-bottom: 1px solid var(--neon-green); color: var(--neon-green); font-family: 'Syncopate'; font-size: 10px; width: 60px; text-align: center; outline: none; }

      input[type="text"], input[type="number"]:not(.editable-input):not(.target-input-small), input[type="date"], select {
          width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--neon-green);
          color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px;
          font-family: 'Rajdhani'; outline: none; transition: 0.3s;
      }
      input:focus, select:focus { box-shadow: 0 0 15px rgba(0, 255, 136, 0.5); border: 1.5px solid var(--neon-green); }

      .btn-submit {
          background: linear-gradient(90deg, var(--neon-green), var(--gold));
          background-size: 200% auto; color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px;
          font-family: 'Syncopate'; font-weight: 900; cursor: pointer; transition: 0.5s;
          text-transform: uppercase; animation: bicolor-glow 2s infinite linear;
      }
      @keyframes bicolor-glow {
          0% { background-position: 0% 50%; box-shadow: 0 0 10px var(--neon-green), 0 0 15px var(--gold); }
          50% { background-position: 100% 50%; box-shadow: 0 0 20px var(--neon-green), 0 0 30px var(--gold); }
          100% { background-position: 0% 50%; box-shadow: 0 0 10px var(--neon-green), 0 0 15px var(--gold); }
      }
      .btn-submit:disabled { background: var(--danger) !important; color: #fff; animation: none; }

      /* LIST ITEMS */
      .bet-item { background: rgba(255, 255, 255, 0.03); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; align-items: center; }
      .status-badge { padding: 5px 10px; border-radius: 6px; font-size: 9px; font-family: 'Syncopate'; cursor: pointer; }
      .badge-win { background: var(--neon-green); color: #000; }
      .badge-loss { background: var(--danger); color: #fff; }
      .badge-pending { background: #333; color: #fff; }

      /* PAGES & NAV */
      .page { display: none; }
      .page.active { display: block; }
      .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: #080a0d; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 1000; }
      .nav-link { color: #444; text-decoration: none; font-size: 7px; font-family: 'Syncopate'; text-align: center; flex: 1; cursor: pointer; }
      .nav-link.active { color: var(--neon-green); }
      .nav-link i { display: block; font-size: 22px; margin-bottom: 5px; }

      .res-card { background: var(--card-bg); border: 1px solid rgba(255, 51, 102, 0.2); padding: 25px; border-radius: 20px; }
      .res-title { color: var(--danger); font-family: 'Syncopate'; font-size: 16px; text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255, 51, 102, 0.2); padding-bottom: 15px; }
      .helpline-btn { background: var(--danger); color: #fff; padding: 15px; border-radius: 12px; text-decoration: none; display: block; text-align: center; font-family: 'Syncopate'; font-weight: 700; margin-top: 20px; }
    </style>
  </head>
  <body>
    <div id="header-area">
      <header class="app-header">
        <div class="logo-container">
          <h1 class="logo-main-text">rGd<span>bet</span></h1>
          <div class="logo-underline"></div>
        </div>
        <div class="social-row">
          <a href="#" class="social-icon"><i class="fa-brands fa-instagram"></i></a>
          <a href="#" class="social-icon"><i class="fa-brands fa-facebook"></i></a>
          <a href="#" class="social-icon"><i class="fa-brands fa-tiktok"></i></a>
        </div>
        <a href="https://revolut.me/rgdbet" class="btn-donate-pulse">REVOLUT DONATE</a>
      </header>

      <div class="stats-area">
        <div class="stats-grid">
          <div class="stat-card">
            <span id="total-p" class="stat-val">0</span>
            <span class="stat-label">Profit Net</span>
          </div>
          <div class="stat-card">
            <input type="number" id="budget-input" class="editable-input" value="1000" oninput="handleDeposit(this.value)" />
            <span class="stat-label">Sold Curent</span>
          </div>
          <div class="stat-card">
            <span id="total-wr" class="stat-val">0%</span>
            <span class="stat-label">Win Rate</span>
          </div>
          <div class="stat-card">
            <div id="form-circles" style="display:flex; gap:5px; justify-content:center;"></div>
            <span class="stat-label">Formă</span>
          </div>
        </div>
        <div class="target-container">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-family:'Syncopate'; font-size:9px; color:var(--neon-green);">TARGET:
              <input type="number" id="target-val" class="target-input-small" value="5000" oninput="render()" /> RON</span>
            <span id="target-pct" style="font-family:'Syncopate'; font-size:9px;">0%</span>
          </div>
          <div class="target-bar-bg"><div id="target-bar-fill" class="target-bar-fill"></div></div>
        </div>
      </div>
    </div>

    <div id="history-page" class="page active" style="padding: 0 20px 120px 20px;">
      <div style="background:var(--card-bg); padding:15px; border-radius:20px; margin-bottom:20px; border:1px solid #111;">
        <canvas id="mainChart" style="height:180px;"></canvas>
      </div>
      <div style="background:var(--card-bg); padding:20px; border-radius:20px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.05);">
        <input type="text" id="match" placeholder="Meci" />
        <div style="display:flex; gap:10px;">
          <input type="number" id="odds" step="0.01" placeholder="Cota" />
          <input type="number" id="stake" placeholder="Miza" oninput="render()" />
        </div>
        <div id="risk-indicator">SELECTEAZĂ MIZA</div>
        <input type="date" id="bet-date" />
        <select id="status">
          <option value="pending">⏳ PENDING</option>
          <option value="win">✅ WIN</option>
          <option value="loss">❌ LOSS</option>
        </select>
        <button id="add-btn" class="btn-submit" onclick="addBet()">ADĂUGĂ PARIU</button>
      </div>
      <div id="history-container"></div>
    </div>

    <div id="strategy-page" class="page" style="padding: 20px 20px 120px 20px;">
      <div class="res-card" style="border-color: var(--neon-green);">
        <div class="res-title" style="color: var(--neon-green);">"Puterea Unicului Eveniment"</div>
        <div class="res-text">
          <p>Matematica nu minte. Un singur meci = șanse maxime.</p>
        </div>
      </div>
    </div>

    <div id="responsible-page" class="page" style="padding: 20px 20px 120px 20px;">
      <div class="res-card">
        <div class="res-title">PARIAT RESPONSABIL</div>
        <a href="tel:0800800099" class="helpline-btn">HELPLINE: 0800 800 099</a>
      </div>
    </div>

    <nav class="nav-bar">
      <div class="nav-link active" onclick="showPage('history')"><i class="fa-solid fa-terminal"></i>CONSOLE</div>
      <div class="nav-link" onclick="showPage('strategy')"><i class="fa-solid fa-lightbulb"></i>STRATEGY</div>
      <div class="nav-link" onclick="showPage('responsible')"><i class="fa-solid fa-shield-heart"></i>RESPONSABIL</div>
      <div class="nav-link" onclick="resetApp()"><i class="fa-solid fa-trash"></i>RESET</div>
    </nav>

    <script>
      let bets = JSON.parse(localStorage.getItem('rgdbet_v_pro_edit')) || []
      let offsetBalance = parseFloat(localStorage.getItem('rgdbet_offset')) || 0
      let baseDeposit = parseFloat(localStorage.getItem('rgdbet_deposit')) || 1000
      let myChart

      document.getElementById('bet-date').valueAsDate = new Date()

      function showPage(p) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'))
        document.getElementById(p + '-page').classList.add('active')
        document.getElementById('header-area').style.display = (p === 'history') ? 'block' : 'none'
        document.querySelector(`[onclick="showPage('${p}')"]`).classList.add('active')
      }

      function handleDeposit(val) {
        let newVal = parseFloat(val); if (isNaN(newVal)) return;
        let flow = 0; bets.forEach(b => { flow -= b.s; if (b.st === 'win') flow += b.s * b.o });
        baseDeposit = newVal; offsetBalance = -flow;
        localStorage.setItem('rgdbet_deposit', baseDeposit); localStorage.setItem('rgdbet_offset', offsetBalance);
        render()
      }

      function addBet() {
        const m = document.getElementById('match').value, o = parseFloat(document.getElementById('odds').value), s = parseFloat(document.getElementById('stake').value), st = document.getElementById('status').value, d = document.getElementById('bet-date').value;
        if (!m || isNaN(o) || isNaN(s) || !d) return;
        if (st === 'win') confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        bets.push({ id: Date.now(), m, o, s, st, d });
        localStorage.setItem('rgdbet_v_pro_edit', JSON.stringify(bets));
        render(); document.getElementById('match').value = ''; document.getElementById('odds').value = ''; document.getElementById('stake').value = '';
      }

      function toggleStatus(id) {
        const i = bets.findIndex(b => b.id === id);
        bets[i].st = bets[i].st === 'pending' ? 'win' : (bets[i].st === 'win' ? 'loss' : 'pending');
        localStorage.setItem('rgdbet_v_pro_edit', JSON.stringify(bets)); render()
      }

      function render() {
        const container = document.getElementById('history-container'), riskInd = document.getElementById('risk-indicator'), currentStake = parseFloat(document.getElementById('stake').value) || 0;
        container.innerHTML = ''; document.getElementById('form-circles').innerHTML = '';
        let totalP = 0, wallet = baseDeposit + offsetBalance, wins = 0, settled = 0;

        bets.forEach(b => {
          wallet -= b.s; if (b.st === 'win') wallet += b.s * b.o
          if (b.st !== 'pending') { totalP += b.st === 'win' ? b.s * b.o - b.s : -b.s; settled++; if (b.st === 'win') wins++ }
        });

        if (currentStake > 0) {
            let risk = (currentStake / wallet) * 100;
            riskInd.style.opacity = "1";
            if (risk <= 5) { riskInd.innerText = "RISC SCĂZUT (SAFE)"; riskInd.className = "risk-low"; }
            else if (risk <= 15) { riskInd.innerText = "RISC MEDIU (ATENȚIE)"; riskInd.className = "risk-mid"; }
            else { riskInd.innerText = "RISC RIDICAT (DEMENȚĂ)"; riskInd.className = "risk-high"; }
        } else { riskInd.style.opacity = "0"; }

        [...bets].sort((a,b) => new Date(b.d) - new Date(a.d)).forEach(b => {
          const accent = b.st === 'win' ? 'var(--neon-green)' : b.st === 'loss' ? 'var(--danger)' : '#444';
          container.innerHTML += `<div class="bet-item" style="border-left: 5px solid ${accent}"><div><strong>${b.m}</strong><div style="font-size:10px; color:#888;">${b.d} | COTA ${b.o}</div></div><div style="text-align:right;"><span class="status-badge badge-${b.st}" onclick="toggleStatus(${b.id})">${b.st.toUpperCase()}</span></div></div>`
        });

        document.getElementById('total-p').innerText = totalP.toFixed(0);
        document.getElementById('total-p').style.color = totalP >= 0 ? 'var(--neon-green)' : 'var(--danger)';
        document.getElementById('budget-input').value = wallet.toFixed(0);
        document.getElementById('total-wr').innerText = (settled > 0 ? (wins/settled)*100 : 0).toFixed(0) + '%';
        
        let prog = (wallet / (parseFloat(document.getElementById('target-val').value)||5000)) * 100;
        document.getElementById('target-bar-fill').style.width = Math.min(100, prog) + "%";
        document.getElementById('target-pct').innerText = Math.min(100, prog).toFixed(0) + "%";

        if (!myChart) initChart(); updateChart()
      }

      function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        myChart = new Chart(ctx, { type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#00ff88', tension: 0.4, fill: true, backgroundColor: 'rgba(0,255,136,0.1)' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.05)' } } } } });
      }

      function updateChart() {
        let sorted = [...bets].filter(b => b.st !== 'pending').sort((a,b) => new Date(a.d) - new Date(b.d));
        let cumul = 0; myChart.data.labels = sorted.map(b => b.d);
        myChart.data.datasets[0].data = sorted.map(b => { cumul += b.st === 'win' ? b.s * b.o - b.s : -b.s; return cumul });
        myChart.update()
      }

      function resetApp() { if (confirm('Resetezi tot?')) { localStorage.clear(); location.reload() } }
      window.onload = render
    </script>
  </body>
</html>
