<!DOCTYPE html>
<html lang="ro">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="rGdbet">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="manifest" href="manifest.json">

<script>
  // Înregistrarea Service Worker-ului (pentru funcționare offline)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js');
    });
  }
</script>
    <style>
        :root {
            --primary-green: #00ff88;
            --neon-gold: #ffcc00;
            --dark-bg: #0a0e12;
            --error-red: #ff4444;
            --glass-dark: rgba(0, 0, 0, 0.85);
            --insta-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --facebook-blue: #1877F2;
        }

        body { margin: 0; padding: 0; color: white; font-family: 'Roboto', sans-serif; background-color: var(--dark-bg); overflow-x: hidden; font-size: 14px; }
        
        #video-background { position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: -1; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; position: relative; z-index: 1000; }
        
        /* LOGO - LUMINARE VERDE PERMANENTĂ  */
        .logo { 
            font-family: 'Exo 2', sans-serif; 
            font-size: 3rem; 
            font-weight: 900; 
            text-decoration: none;
            color: var(--primary-green);
            text-shadow: 0 0 10px var(--primary-green), 0 0 20px var(--primary-green), 0 0 40px rgba(0, 255, 136, 0.5);
            animation: pulseGreen 2s infinite alternate;
        }
        @keyframes pulseGreen {
            from { text-shadow: 0 0 10px var(--primary-green), 0 0 20px var(--primary-green); }
            to { text-shadow: 0 0 20px var(--primary-green), 0 0 40px var(--primary-green), 0 0 60px rgba(0, 255, 136, 0.8); }
        }

        .social-links { display: flex; gap: 20px; align-items: center; }
        .social-links a { color: white; font-size: 1.5rem; transition: 0.3s ease; text-decoration: none; }
        
        .fa-facebook:hover { color: var(--facebook-blue); filter: drop-shadow(0 0 15px var(--facebook-blue)); transform: scale(1.3); }
        .fa-instagram:hover { background: var(--insta-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px #bc1888); transform: scale(1.3); }
        
        .btn-donate { background: var(--neon-gold); color: black; padding: 8px 20px; border-radius: 20px; font-weight: 900; font-size: 0.85rem; text-transform: uppercase; text-decoration: none; transition: 0.3s; box-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }
        .btn-donate:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--neon-gold); }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px 100px 20px; position: relative; z-index: 1; }

        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        
        .stat-box { background: var(--glass-dark); padding: 15px 5px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s ease; }
        .stat-box:hover { box-shadow: 0 0 20px var(--primary-green); border-color: var(--primary-green); transform: translateY(-3px); }
        
        .stat-box p { font-size: 0.6rem; color: #888; text-transform: uppercase; margin: 0; }
        .budget-input { background: transparent; border: none; color: white; font-family: 'Exo 2'; font-size: 1.2rem; font-weight: 900; text-align: center; width: 80%; outline: none; }

        .balance-container { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .fs-row { display: flex; justify-content: center; }
        .fs-dot { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 3px; font-size: 10px; font-weight: 900; margin: 0 2px; color: white; }
        .fs-win { background-color: #008144; } 
        .fs-loss { background-color: #e43333; }
        .balance-count { font-size: 12px; font-weight: 900; font-family: 'Exo 2'; }
        .count-win { color: var(--primary-green); }
        .count-loss { color: var(--error-red); }

        .premium-row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card-compact { background: var(--glass-dark); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }

        .risk-title { margin: 0 0 15px 0; color: var(--neon-gold); font-size: 1.3rem; font-family: 'Exo 2'; font-weight: 900; letter-spacing: 1px; transition: 0.3s; text-shadow: 0 0 10px rgba(255, 204, 0, 0.4); }
        .card-compact:hover .risk-title { text-shadow: 0 0 20px var(--neon-gold); transform: scale(1.02); }

        .add-form { background: var(--glass-dark); padding: 15px; border-radius: 12px; display: flex; gap: 8px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .add-form input, .add-form select { background: rgba(0,0,0,0.4); border: 1px solid #333; color: white; padding: 8px; border-radius: 6px; font-size: 0.8rem; flex: 1; }
        
        .btn-add { background: var(--primary-green); color: black; border: none; padding: 0 20px; border-radius: 6px; font-weight: 900; cursor: pointer; transition: 0.3s ease; }
        .btn-add:hover { box-shadow: 0 0 25px var(--primary-green); transform: scale(1.05); }

        .btn-kelly { background: var(--neon-gold); border: none; padding: 10px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s ease; width: 100%; }
        .btn-kelly:hover { box-shadow: 0 0 25px var(--neon-gold); transform: scale(1.02); }

        /* TABEL PREMIUM CU ILUMINARE DINAMICĂ [cite: 55, 56, 57, 58, 59] */
        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
        thead th { font-size: 0.9rem; color: #ffffff; text-transform: uppercase; padding: 12px; font-weight: 900; text-align: center; }
        
        tbody tr { background: rgba(255, 255, 255, 0.03); transition: 0.3s ease; cursor: pointer; }
        
        /* ILUMINARE MECIURI CÂȘTIGATE (VERDE)  */
        tbody tr.row-win:hover { 
            background: rgba(0, 255, 136, 0.15); 
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            transform: scale(1.01);
        }

        /* ILUMINARE MECIURI PIERDUTE (ROȘU) */
        tbody tr.row-loss:hover { 
            background: rgba(255, 68, 68, 0.15); 
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.3);
            transform: scale(1.01);
        }

        td { padding: 12px; text-align: center; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
        td:first-child { border-left: 1px solid rgba(255,255,255,0.05); border-radius: 8px 0 0 8px; }
        td:last-child { border-right: 1px solid rgba(255,255,255,0.05); border-radius: 0 8px 8px 0; }
        
        .btn-delete { background: none; border: none; color: var(--error-red); cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn-delete:hover { transform: scale(1.2); filter: drop-shadow(0 0 8px var(--error-red)); }

        .win { color: var(--primary-green); }
        .loss { color: var(--error-red); }

        /* TEXT ROȘU PENTRU "NU PARIA"  */
        .no-bet { color: var(--error-red) !important; font-weight: 900; text-shadow: 0 0 10px rgba(255, 68, 68, 0.5); }

        .footer-warning { position: fixed; bottom: 0; width: 100%; background: rgba(255, 0, 0, 0.7); color: white; padding: 10px 0; text-align: center; font-weight: 900; z-index: 2000; font-size: 0.8rem; transition: 0.3s; border-top: 1px solid rgba(255,255,255,0.1); }
        .footer-warning:hover { background: rgba(255, 0, 0, 0.95); box-shadow: 0 -10px 25px rgba(255, 0, 0, 0.6); cursor: pointer; }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="video-background"><source src="fundal.mp4" type="video/mp4"></video>
    <div class="video-overlay"></div>

    <nav>
        <a href="#" class="logo">RotaruGabriel</a>
        <div class="social-links">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#" class="btn-donate"><i class="fas fa-heart"></i> DONAȚII</a>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-box"><p>Buget</p><input type="number" id="initialBudgetInput" class="budget-input" oninput="saveAndRefresh()"></div>
            <div class="stat-box"><p>Profit</p><h3 id="totalProfitDisplay" style="margin:5px 0 0;">0</h3></div>
            <div class="stat-box"><p>Bancă</p><h3 id="currentBankDisplay" style="margin:5px 0 0;">0</h3></div>
            <div class="stat-box">
                <p>Bilanț</p>
                <div class="balance-container">
                    <div id="balanceDisplay" class="fs-row"></div>
                    <div id="balanceNumeric" class="balance-count"></div>
                </div>
            </div>
            <div class="stat-box"><p>Win Rate</p><h3 id="winRateDisplay" style="margin:5px 0 0;">0%</h3></div>
        </div>

        <div class="premium-row">
            <div class="card-compact">
                <canvas id="weeklyChart" height="140"></canvas>
            </div>
            <div class="card-compact">
                <h4 class="risk-title"><i class="fas fa-shield-virus"></i> MANAGEMENT RISK</h4>
                <div style="display:grid; gap:8px;">
                    <input type="number" id="k-cota" placeholder="Cotă" style="background:#000; border:1px solid #333; color:white; padding:8px; border-radius:4px;">
                    <input type="number" id="k-prob" placeholder="Probabilitate AI %" style="background:#000; border:1px solid #333; color:white; padding:8px; border-radius:4px;">
                    <button onclick="calculateKelly()" class="btn-kelly">Calculează Miza Optimă</button>
                    <div id="kelly-res" style="text-align:center; font-weight:900; color:var(--primary-green); font-size:1rem; margin-top:5px;"></div>
                </div>
            </div>
        </div>

        <div class="add-form">
            <input type="text" id="matchName" placeholder="Meci">
            <input type="number" id="matchCota" step="0.01" placeholder="Cotă">
            <input type="number" id="matchMiza" placeholder="Miză">
            <select id="dayOfWeek">
                <option value="Luni">Luni</option><option value="Marți">Marți</option><option value="Miercuri">Miercuri</option>
                <option value="Joi">Joi</option><option value="Vineri">Vineri</option><option value="Sâmbătă">Sâmbătă</option><option value="Duminică">Duminică</option>
            </select>
            <select id="matchResult">
                <option value="CÂȘTIGAT ✅">CÂȘTIGAT ✅</option>
                <option value="PIERDUT ❌">PIERDUT ❌</option>
            </select>
            <button class="btn-add" onclick="addMatch()">ADĂUGĂ</button>
        </div>

        <div class="card-compact" style="padding:10px; background: transparent; border: none;">
            <table>
                <thead><tr><th>ZI</th><th>EVENIMENT</th><th>COTĂ</th><th>MIZĂ</th><th>PROFIT</th><th></th></tr></thead>
                <tbody id="matchTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="footer-warning">🔞 PARIAZĂ RESPONSABIL! PESTE 18 ANI</div>

    <script>
        let matches = JSON.parse(localStorage.getItem('rgdbet_matches')) || [];
        document.getElementById('initialBudgetInput').value = localStorage.getItem('rgdbet_budget') || 500;
        let chart;

        function addMatch() {
            const name = document.getElementById('matchName').value;
            const cota = parseFloat(document.getElementById('matchCota').value);
            const miza = parseFloat(document.getElementById('matchMiza').value);
            const day = document.getElementById('dayOfWeek').value;
            const result = document.getElementById('matchResult').value;
            if(!name || !cota || !miza) return;
            matches.push({ id: Date.now(), name, cota, miza, result, day });
            saveAndRefresh();
        }

        function deleteMatch(id) {
            matches = matches.filter(m => m.id !== id);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('rgdbet_matches', JSON.stringify(matches));
            localStorage.setItem('rgdbet_budget', document.getElementById('initialBudgetInput').value);
            renderTable();
            updateStats();
            updateChart();
        }

        function renderTable() {
            const tbody = document.getElementById('matchTableBody');
            tbody.innerHTML = '';
            matches.forEach(m => {
                const isWin = m.result.includes('CÂȘTIGAT');
                const profit = isWin ? (m.miza * (m.cota - 1)) : -m.miza;
                const rowClass = isWin ? 'row-win' : 'row-loss'; // CLASĂ DINAMICĂ PENTRU ILUMINARE 
                tbody.innerHTML += `<tr class="${rowClass}">
                    <td>${m.day}</td>
                    <td>${m.name}</td>
                    <td style="color:var(--neon-gold)">${m.cota.toFixed(2)}</td>
                    <td>${m.miza}</td>
                    <td class="${isWin?'win':'loss'}">${profit.toFixed(2)}</td>
                    <td><button class="btn-delete" onclick="deleteMatch(${m.id})"><i class="fas fa-trash-alt"></i></button></td>
                </tr>`;
            });
        }

        function updateStats() {
            const initialBudget = parseFloat(document.getElementById('initialBudgetInput').value) || 0;
            let totalProfit = 0, wins = 0, losses = 0;
            const balanceDiv = document.getElementById('balanceDisplay');
            const balanceNumeric = document.getElementById('balanceNumeric');
            balanceDiv.innerHTML = '';
            
            matches.slice(-5).forEach(m => { 
                const isWin = m.result.includes('CÂȘTIGAT');
                balanceDiv.innerHTML += `<span class="fs-dot ${isWin?'fs-win':'fs-loss'}">${isWin?'W':'L'}</span>`;
            });

            matches.forEach(m => {
                if(m.result.includes('CÂȘTIGAT')) { wins++; totalProfit += (m.miza * (m.cota - 1)); }
                else { losses++; totalProfit -= m.miza; }
            });
            
            balanceNumeric.innerHTML = `<span class="count-win">${wins}</span> / <span class="count-loss">${losses}</span>`;
            document.getElementById('totalProfitDisplay').innerText = totalProfit.toFixed(2) + " RON";
            document.getElementById('totalProfitDisplay').style.color = totalProfit >= 0 ? "var(--primary-green)" : "var(--error-red)";
            document.getElementById('currentBankDisplay').innerText = (initialBudget + totalProfit).toFixed(2) + " RON";
            document.getElementById('winRateDisplay').innerText = (matches.length > 0 ? (wins/matches.length*100).toFixed(1) : 0) + "%";
        }

        function updateChart() {
            const days = ["Luni", "Marți", "Miercuri", "Joi", "Vineri", "Sâmbătă", "Duminică"];
            const dailyData = days.map(d => matches.filter(m => m.day === d).reduce((acc, m) => acc + (m.result.includes('CÂȘTIGAT') ? (m.miza * (m.cota - 1)) : -m.miza), 0));
            if (chart) chart.destroy();
            chart = new Chart(document.getElementById('weeklyChart'), {
                type: 'line',
                data: { 
                    labels: days, 
                    datasets: [{ 
                        data: dailyData, 
                        borderColor: '#00ff88',
                        backgroundColor: 'rgba(0, 255, 136, 0.2)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointBackgroundColor: '#ffcc00'
                    }] 
                },
                options: { 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888' } },
                        x: { grid: { display: false }, ticks: { color: '#888' } }
                    } 
                }
            });
        }

        function calculateKelly() {
            const b = parseFloat(document.getElementById('k-cota').value) - 1;
            const p = parseFloat(document.getElementById('k-prob').value) / 100;
            const bank = parseFloat(document.getElementById('currentBankDisplay').innerText);
            const f = (p * b - (1 - p)) / b;
            const resDisplay = document.getElementById('kelly-res');
            
            if(f > 0) {
                resDisplay.innerText = `MIZĂ: ${(f * bank * 0.25).toFixed(2)} RON`;
                resDisplay.className = ''; // Reset class
            } else {
                resDisplay.innerText = "NU PARIA";
                resDisplay.className = 'no-bet'; // APLICĂ CLASA ROȘIE 
            }
        }

        renderTable(); updateStats(); updateChart();
    </script>
</body>
</html>
